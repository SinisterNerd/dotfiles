# Catppuccin themed mocha settings for colorls
#
# Main Colors
unrecognized_file: '#dc8a78' # Rosewater
recognized_file:   '#6c6f85' # Subtext0
executable_file:   '#40a02b' # Green
dir:               '#7287fd' # Lavender

# Link
dead_link: '#d20f39'         # Red
link:      '#179299'         # Teal

# Special Files
socket:    '#40a02b'         # Green
blockdev:  '#40a02b'         # Green
chardev:   '#40a02b'         # Green

# Access Modes
write:     '#ea76cb'         # Pink
read:      '#8839ef'         # Mauve
exec:      '#179299'         # Teal
no_access: '#d20f39'         # Red

# Age -- kept from Dracula Theme
