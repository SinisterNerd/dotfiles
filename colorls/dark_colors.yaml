# File Size
file_large:  '#d20f39'       # Red
file_medium: '#fe640b'       # Peach
file_small:  '#40a02b'       # Green

# Random
report: '#40a02b'            # Green
user:   '#179299'            # Teal
tree:   '#44475a'            # Current Line -- Dracula
empty:  '#6272a4'            # Comment -- Dracula
error:  '#d20f39'            # Red
normal: '#6c6f85'            # Subtext0

# Git
addition:     '#179299'      # Teal
modification: '#df8e1d'      # Yellow
deletion:     '#d20f39'      # Red
untracked:    '#fe640b'      # Peach
unchanged:    '#40a02b'      # Green
