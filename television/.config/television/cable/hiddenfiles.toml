[metadata]
name = "hiddenfiles"
description = "A channel to select files, includin hidden files and folders"
requirements = ["fd", "bat"]

[source]
command = [
  { name = "Default", run = "fd -H -t f -t d -E .git " },
  #{ name = "Hidden",  run = "fd -t f -H" },
]

[preview]
command = "eza -la '{}' && echo '' && bat -n --color=always '{}'" 
env = { BAT_THEME = "ansi" }

[keybindings]
shortcut = "f1"
f12 = "actions:edit"
ctrl-e = "actions:edit"
ctrl-up = "actions:goto_parent_dir"

[actions.edit]
description = "Opens the selected entries with the default editor (falls back to vim)"
command = "${EDITOR:-nvim} '{}'"
shell = "bash"
# use `mode = "fork"` if you want to return to tv afterwards
mode = "execute"

[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv files .."
mode = "execute"

[actions.details]
description = "Get file details"
command = "ls -la '{}' | less"
shell = "bash"
mode = "execute"


