## vim:set ft=tmux:

%hidden MODULE_NAME="custom_os"

set -g "@catppuccin_${MODULE_NAME}_icon" "💿 "
set -gF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_maroon}"
# Dynamically fetch OS name (works for macOS/Linux)
set -g "@catppuccin_${MODULE_NAME}_text" " #(uname -s)"

source -F "#{d:current_file}/../utils/status_module.conf"
